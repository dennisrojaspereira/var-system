name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"   # semanal: pega CVEs novos mesmo sem commits

jobs:
  # ---- SAST profundo: CodeQL (gratuito em repos publicos) ----
  codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@v3

  # ---- SAST rapido + auditoria de dependencias ----
  sast:
    name: SAST - Bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar ferramentas e dependencias leves
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit \
            "numpy>=1.26" "opencv-python-headless>=4.9" "pyyaml>=6.0" \
            "fastapi>=0.110" "uvicorn[standard]>=0.29" "pydantic>=2.6" \
            "kafka-python>=2.0" "psycopg[binary]>=3.2"
      - name: Bandit (codigo do pacote var/)
        run: bandit -r var/ -ll
      - name: pip-audit (CVEs nas dependencias instaladas)
        run: pip-audit --skip-editable

  # ---- Scan da imagem Docker: Trivy ----
  container:
    name: Container - Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build da imagem base
        run: docker build -f docker/Dockerfile -t var-system:scan .
      - name: Trivy (CVEs na imagem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: var-system:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"   # report-only; mude para "1" para bloquear o build
          ignore-unfixed: true

  # ---- DAST: OWASP ZAP baseline contra a API rodando ----
  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias leves
        run: |
          python -m pip install \
            "numpy>=1.26" "opencv-python-headless>=4.9" "pyyaml>=6.0" \
            "fastapi>=0.110" "uvicorn[standard]>=0.29" "pydantic>=2.6" \
            "kafka-python>=2.0" "psycopg[binary]>=3.2"
      - name: Subir a API de decisao
        run: |
          python -m var.cli api &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 1
          done
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:8000"
          cmd_options: "-I"          # report-only: nao falha em warnings
          allow_issue_writing: false
          artifact_name: zap-report
