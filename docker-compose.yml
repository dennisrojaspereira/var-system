# Stack local do var-system.
#
#   docker compose up -d --build              # kafka + kafka-ui + api + consumer
#   docker compose --profile ingest up -d     # + ingestao FFmpeg ao vivo
#   docker compose --profile ml build         # imagem com YOLO/torch (endpoint /analyze)
#
# Servicos expostos no host:
#   - API de decisao .... http://localhost:8000/docs
#   - Kafka UI .......... http://localhost:8080

name: var-system

services:
  # ---- Kafka (KRaft, sem Zookeeper) ----
  kafka:
    image: apache/kafka:3.9.1
    container_name: var-kafka
    ports:
      - "9092:9092"   # acesso externo (host) via localhost:9092
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=INTERNAL://:9094,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9094 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---- Kafka UI (observabilidade) ----
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: var-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=var
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9094
    depends_on:
      kafka:
        condition: service_healthy

  # ---- PostgreSQL + TimescaleDB (deteccoes, eventos, partidas) ----
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: var-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=var
      - POSTGRES_PASSWORD=var
      - POSTGRES_DB=var
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./var/storage/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U var -d var"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---- API de suporte a decisao (FastAPI) ----
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        INSTALL_ML: ${INSTALL_ML:-false}
    image: var-system:latest
    container_name: var-api
    ports:
      - "8000:8000"
    environment:
      - VAR_EVENTS_BACKEND=kafka
      - VAR_KAFKA_BOOTSTRAP=kafka:9094
      - VAR_API_HOST=0.0.0.0
      - VAR_API_PORT=8000
      - VAR_DB_DSN=postgresql://var:var@db:5432/var
    volumes:
      - ./samples:/app/samples
      - ./buffer:/app/buffer
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy

  # ---- Consumer de eventos (auditoria/broadcast/analytics) ----
  consumer:
    image: var-system:latest
    container_name: var-consumer
    pull_policy: never
    command: ["python", "-m", "var.events.consumer"]
    environment:
      - VAR_EVENTS_BACKEND=kafka
      - VAR_KAFKA_BOOTSTRAP=kafka:9094
    depends_on:
      kafka:
        condition: service_healthy
      api:
        condition: service_started

  # ---- Sink de eventos: Kafka -> Postgres (tabela var_events) ----
  events-sink:
    image: var-system:latest
    container_name: var-events-sink
    pull_policy: never
    command: ["python", "-m", "var.storage.event_sink"]
    environment:
      - VAR_EVENTS_BACKEND=kafka
      - VAR_KAFKA_BOOTSTRAP=kafka:9094
      - VAR_DB_DSN=postgresql://var:var@db:5432/var
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
      api:
        condition: service_started

  # ---- Ingestao FFmpeg ao vivo (opcional: profile 'ingest') ----
  # Requer videos em ./samples (gere com: python -m var.cli sample).
  ingest:
    image: var-system:latest
    container_name: var-ingest
    pull_policy: never
    profiles: ["ingest"]
    command: ["python", "-m", "var.cli", "ingest"]
    environment:
      - VAR_INGESTION_OUTPUT_DIR=/app/buffer
    volumes:
      - ./samples:/app/samples
      - ./buffer:/app/buffer
    depends_on:
      api:
        condition: service_started

volumes:
  db-data:
